name: Windows CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build

  tauri-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Prepare sing-box for Tauri bundle
        shell: pwsh
        run: |
          ./scripts/download-singbox.ps1
          New-Item -ItemType Directory -Force -Path src-tauri/resources/sing-box/windows-amd64 | Out-Null
          Copy-Item resources/sing-box/windows-amd64/* src-tauri/resources/sing-box/windows-amd64/ -Force
      - name: Cargo check (Tauri)
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Unit tests (scenario_logic)
        run: cargo test --manifest-path src-tauri/Cargo.toml scenario_logic -- --nocapture
      - name: Smoke — module layout
        shell: pwsh
        run: |
          $files = @(
            "src-tauri/src/vpn/mod.rs",
            "src-tauri/src/vpn/connect.rs",
            "src-tauri/src/vpn/status.rs",
            "src-tauri/src/vpn/logs.rs",
            "src-tauri/src/wininet_registry.rs"
          )
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { throw "Missing $f" }
          }
          Write-Host "VPN module split OK"

